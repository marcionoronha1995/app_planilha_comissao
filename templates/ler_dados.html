{% extends "base.html" %}

{% block conteudo %}
<style>
    .card-upload {
        max-width: 600px;
    }
</style>

<div class="mt-4">
    <h2 class="fw-bold">📥 Ler Dados</h2>
    <p class="text-muted">Faça o upload da sua planilha de vendas (formato CSV) para o sistema.</p>

    <div class="card shadow-sm mt-4 card-upload">
        <div class="card-body p-4">
            <form action="/comissao" method="POST" enctype="multipart/form-data">
                <div class="mb-4">
                    <label for="arquivo_csv" class="form-label fw-bold text-secondary">Selecione o arquivo CSV</label>
                    <input class="form-control form-control-lg" type="file" id="arquivo_csv" name="arquivo_csv" accept=".csv" required>
                    <div class="form-text mt-2">Apenas arquivos com extensão .csv são aceitos.</div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                    Carregar e Processar Dados
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
