{% extends "base.html" %}

{% block conteudo %}
<div class="mt-4">
    <h2 class="fw-bold">✉️ {{ _('contato_titulo') }}</h2>
    <p class="text-muted">{{ _('contato_desc') }}</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-contato alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card shadow-sm mt-4 card-contato border-0">
        <div class="card-body p-4">
            <form action="{{ url_for('enviar_contato') }}" method="POST">
                <div class="mb-3">
                    <label for="nome" class="form-label fw-bold">{{ _('label_nome') }}</label>
                    <input type="text" class="form-control" id="nome" name="nome" placeholder="{{ _('placeholder_nome') }}" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label fw-bold">{{ _('label_email') }}</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="{{ _('placeholder_email') }}" required>
                </div>
                <div class="mb-3">
                    <label for="telefone" class="form-label fw-bold">{{ _('label_telefone') }}</label>
                    <input type="text" class="form-control" id="telefone" name="telefone" placeholder="{{ _('placeholder_telefone') }}">
                </div>
                <div class="mb-3">
                    <label for="mensagem" class="form-label fw-bold">{{ _('label_mensagem') }}</label>
                    <textarea class="form-control" id="mensagem" name="mensagem" rows="4" placeholder="{{ _('placeholder_mensagem') }}" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">{{ _('btn_enviar') }}</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
