{% extends "base.html" %}

{% block conteudo %}

<div class="mt-4">
    <h2 class="fw-bold">📥 {{ _('ler_dados') }}</h2>
    <p class="text-muted">{{ _('instrucao_upload') }}</p>

    <!-- Seção de Dados Padrão para Apresentação -->
    <div class="card shadow-sm mt-4 card-upload border-info">
        <div class="card-body p-4">
            <div class="mb-3">
                <div class="fw-bold text-info">{{ _('dados_padrao_apresentacao') }}</div>
            </div>
            <!-- Botão que aciona o Modal -->
            <button type="button" class="btn btn-info text-white w-100 py-2 fw-bold" data-bs-toggle="modal" data-bs-target="#modalConfirmacaoPadrao">
                {{ _('btn_carregar_padrao') }}
            </button>
        </div>
    </div>

    <!-- Modal de Confirmação -->
    <div class="modal fade" id="modalConfirmacaoPadrao" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalLabel">{{ _('confirmar_carregamento') }}</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    {{ _('msg_modal_confirmacao') }}
                </div>
                <div class="modal-footer">
                    <form action="{{ url_for('comissao') }}" method="POST" class="w-100">
                        <input type="hidden" name="modo_apresentacao" value="true">
                        <button type="submit" class="btn btn-info text-white w-100">{{ _('sim_carregar_padrao_btn') }}</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm mt-4 card-upload">
        <div class="card-body p-4">
            <form action="{{ url_for('comissao') }}" method="POST" enctype="multipart/form-data">
                <div class="mb-4">
                    <label for="arquivo_csv" class="form-label fw-bold text-secondary">{{ _('selecione_csv') }}</label>
                    <input class="form-control form-control-lg" type="file" id="arquivo_csv" name="arquivo_csv" accept=".csv" required disabled>
                    <div class="form-text mt-2">{{ _('apenas_csv') }}</div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" disabled>
                    {{ _('btn_carregar_arquivo') }}
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
