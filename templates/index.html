<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão - Planilha Comissão</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome para Ícones -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    
    <div class="wrapper">
        <!-- Sidebar (Barra Lateral) -->
        <nav id="sidebar">
            <div class="sidebar-header text-center">
                <h3><i class="fas fa-shield-alt"></i> <span>Gestão</span></h3>
            </div>

            <ul class="list-unstyled components">
                <li class="active">
                    <a href="#">
                        <i class="fas fa-home"></i>
                        <span>Início</span>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <i class="fas fa-file-invoice-dollar"></i>
                        <span>Processar Comissão</span>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <i class="fas fa-lock"></i>
                        <span>Assinar Dados</span>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <i class="fas fa-key"></i>
                        <span>Verificar Integridade</span>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Conteúdo Principal -->
        <div id="content">
            <!-- Barra de Navegação Superior com Botão Toggle -->
            <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
                <div class="container-fluid">
                    <button type="button" id="sidebarCollapse" class="btn btn-primary">
                        <i class="fas fa-bars"></i>
                    </button>
                    <span class="navbar-brand ms-3 mb-0 h1 text-secondary">Painel Administrativo</span>
                </div>
            </nav>

            <!-- Hero Section (Cabeçalho) -->
            <div class="hero-section text-center">
                <div class="container">
                    <h1 class="display-4 fw-bold">Gestão de Comissões</h1>
                    <p class="lead">Sistema seguro de processamento e criptografia de dados.</p>
                </div>
            </div>

            <div class="container mt-4">
                <!-- Cartão de Ações -->
                <div class="calc-card mb-5">
                    <h2 class="mb-4 text-primary"><i class="fas fa-calculator me-2"></i>Ações Rápidas</h2>
                    <div class="row g-4">
                        <div class="col-md-4">
                            <div class="d-grid">
                                <button class="btn btn-processar btn-lg py-3">
                                    <i class="fas fa-play me-2"></i> Processar Agora
                                </button>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="d-grid">
                                <button class="btn btn-outline-dark btn-lg py-3">
                                    <i class="fas fa-pen-nib me-2"></i> Assinar Planilha
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Rodapé -->
                <div class="footer-custom p-4 rounded text-center">
                    <h5>Status do Sistema</h5>
                    <p class="mb-0"><span class="location-dot me-2"></span>Sistema Online e Seguro</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Script para Alternar Sidebar -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('sidebarCollapse').addEventListener('click', function () {
                document.getElementById('sidebar').classList.toggle('active');
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
