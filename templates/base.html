<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Planilha Comissão</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="d-flex flex-column min-vh-100">

    <header>
        <button class="btn btn-dark btn-menu-custom d-inline-flex justify-content-center align-items-center p-2 m-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateralEsquerdo" aria-controls="menuLateralEsquerdo" aria-label="Abrir menu lateral" title="Abrir menu">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/>
            </svg>
        </button>
    </header>

    <div class="offcanvas offcanvas-start shadow" tabindex="-1" id="menuLateralEsquerdo" aria-labelledby="menuLateralLabel">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold" id="menuLateralLabel">Menu</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Fechar"></button>
        </div>

        <div class="offcanvas-body p-0">
            <div class="list-group list-group-flush mt-2">
                {% for item in menu %}
                    <a href="{{ item.url }}" class="list-group-item list-group-item-action py-3 px-4 border-0">
                        {{ item.nome }}
                    </a>
                {% endfor %}
            </div>
        </div>
    </div>

    <main class="container flex-grow-1">
        {% block conteudo %}
        {% endblock %}
    </main>

    <footer class="footer-custom mt-auto py-5">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start">
                    <h5 class="fw-bold mb-1">Marcio Noronha</h5>
                    <p class="text-secondary mb-0">Desenvolvedor Python & Full Stack</p>
                </div>

                <div class="col-md-6 text-center text-md-end mt-3 mt-md-0">
                    <div class="d-flex justify-content-center justify-content-md-end align-items-center mb-2">
                        <span class="location-dot me-2"></span>
                        <span>Balneário Camboriú, SC - Brasil</span>
                    </div>
                    <p class="small text-muted mb-0">
                        &copy; 2026 App Planilha Comissão. Todos os direitos reservados.
                    </p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
